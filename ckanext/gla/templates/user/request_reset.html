{% ckan_extends %}

{% block form %}
  <form action="" method="post" class="form-validate">
    {{ h.csrf_input() }}
    <div class="form-group">
      <label for="field-username"> {{ _('Email or username') }} <span class="small" style="font-weight: normal;">(Required)</span></label>
      <input id="field-username"  class="control-medium form-control" name="user" value="" type="text" autocomplete="username" required="true"/>
    </div>
    <div class="form-actions">
      {% block form_button %}
      <button class="btn btn-primary" type="submit" name="reset">{{ _("Request Reset") }}</button>
      {% endblock %}
    </div>
  </form>
{% endblock %}
